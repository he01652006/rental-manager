<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>房租管理系統</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0f1117; --surface:#1a1d27; --surface2:#222638;
  --border:#2e3250; --accent:#f5a623; --green:#2dd4a0;
  --red:#e8395a; --text:#e8eaf6; --muted:#7b82a8; --radius:12px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:60px;position:sticky;top:0;z-index:100;}
.logo{font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--accent);letter-spacing:2px;}
.logo span{color:var(--muted);font-size:13px;font-family:'Noto Sans TC',sans-serif;margin-left:10px;font-weight:300;}
.month-nav{display:flex;align-items:center;gap:10px;}
.month-nav button{background:var(--surface2);border:1px solid var(--border);color:var(--text);width:30px;height:30px;border-radius:6px;cursor:pointer;font-size:16px;}
.month-nav button:hover{background:var(--border);}
#monthLabel{font-size:15px;font-weight:700;min-width:110px;text-align:center;}
#syncStatus{font-size:11px;padding:3px 10px;border-radius:20px;margin-left:12px;}
#syncStatus.ok{background:rgba(45,212,160,.15);color:var(--green);}
#syncStatus.syncing{background:rgba(245,166,35,.15);color:var(--accent);}
#syncStatus.err{background:rgba(232,57,90,.15);color:var(--red);}
nav{display:flex;gap:2px;padding:14px 24px 0;background:var(--surface);border-bottom:1px solid var(--border);}
nav button{background:none;border:none;color:var(--muted);padding:9px 18px;font-size:14px;font-family:inherit;cursor:pointer;border-bottom:2px solid transparent;font-weight:500;border-radius:8px 8px 0 0;}
nav button.active{color:var(--accent);border-bottom-color:var(--accent);background:rgba(245,166,35,.07);}
nav button:hover:not(.active){color:var(--text);}
main{padding:24px;max-width:1280px;margin:0 auto;}
.page{display:none;} .page.active{display:block;}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px;}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;position:relative;overflow:hidden;}
.stat::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
.stat.s-income::before{background:var(--green);} .stat.s-expense::before{background:var(--red);}
.stat.s-profit::before{background:var(--accent);} .stat.s-rooms::before{background:#818cf8;}
.stat-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;}
.stat-val{font-size:26px;font-weight:900;}
.stat-val.green{color:var(--green);} .stat-val.red{color:var(--red);}
.stat-val.gold{color:var(--accent);} .stat-val.purple{color:#818cf8;}
.stat-sub{font-size:11px;color:var(--muted);margin-top:4px;}
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.sec-title{font-size:17px;font-weight:700;}
.rooms-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
.room-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;cursor:pointer;transition:all .18s;}
.room-card:hover{border-color:var(--accent);transform:translateY(-2px);}
.room-card.paid{border-left:4px solid var(--green);}
.room-card.unpaid{border-left:4px solid var(--red);}
.room-card.empty{border-left:4px solid var(--muted);opacity:.6;}
.rn{font-family:'Bebas Neue',sans-serif;font-size:26px;color:var(--accent);}
.rt{font-size:13px;font-weight:600;margin:3px 0 1px;}
.rrent{font-size:15px;font-weight:700;margin-top:4px;}
.rdue{font-size:11px;color:var(--muted);margin-top:2px;}
.rbadge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;margin-top:6px;}
.rbadge.paid{background:rgba(45,212,160,.15);color:var(--green);}
.rbadge.unpaid{background:rgba(232,57,90,.15);color:var(--red);}
.rbadge.empty{background:rgba(123,130,168,.15);color:var(--muted);}
.tbl-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
table{width:100%;border-collapse:collapse;}
th{background:var(--surface2);padding:11px 14px;text-align:left;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}
td{padding:11px 14px;border-top:1px solid var(--border);font-size:14px;}
tr:hover td{background:var(--surface2);}
.badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:600;}
.badge.water{background:rgba(96,165,250,.15);color:#60a5fa;}
.badge.electric{background:rgba(251,191,36,.15);color:#fbbf24;}
.badge.repair{background:rgba(167,139,250,.15);color:#a78bfa;}
.badge.other{background:rgba(123,130,168,.15);color:var(--muted);}
.meter-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
.meter-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;}
.meter-card .rn{font-size:22px;margin-bottom:2px;}
.meter-card .rt{font-size:12px;color:var(--muted);margin-bottom:10px;}
.meter-row{display:flex;flex-direction:column;margin-bottom:8px;}
.meter-row label{font-size:11px;color:var(--muted);margin-bottom:4px;}
.meter-row input{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:7px 10px;border-radius:6px;font-family:inherit;font-size:14px;width:100%;}
.meter-row input:focus{outline:none;border-color:var(--accent);}
.meter-row input.ro{background:var(--bg);color:var(--muted);}
.meter-result{font-size:12px;color:#fbbf24;margin-top:2px;margin-bottom:6px;min-height:18px;}
.meter-save-btn{width:100%;margin-top:6px;padding:8px;border-radius:7px;background:rgba(245,166,35,.15);border:1px solid var(--accent);color:var(--accent);font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;}
.meter-save-btn:hover{background:rgba(245,166,35,.3);}
.report-controls{display:flex;gap:10px;align-items:center;margin-bottom:18px;flex-wrap:wrap;}
.report-controls select{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:8px;font-family:inherit;font-size:14px;}
.rp-wrap{background:white;color:#1a1a2e;border-radius:var(--radius);padding:36px;max-width:560px;margin:0 auto;box-shadow:0 20px 60px rgba(0,0,0,.5);}
.rp-logo{font-size:10px;color:#bbb;text-align:right;margin-bottom:16px;letter-spacing:1px;font-weight:700;}
.rp-wrap h2{font-size:21px;font-weight:900;margin-bottom:3px;}
.rp-sub{font-size:12px;color:#777;margin-bottom:20px;}
.rp-info{background:#f9fafb;border-radius:8px;padding:14px;margin-bottom:18px;}
.rp-info-row{display:flex;gap:10px;margin-bottom:5px;font-size:13px;}
.rp-info-row .k{color:#888;min-width:65px;} .rp-info-row .v{font-weight:600;}
.rp-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #f0f0f0;font-size:14px;}
.rp-row .lbl{color:#555;} .rp-row .val{font-weight:700;}
.rp-total{background:#1a1a2e;color:white;padding:14px 18px;border-radius:9px;display:flex;justify-content:space-between;font-weight:900;font-size:17px;margin-top:18px;}
.rp-status{text-align:center;margin-top:14px;font-size:14px;font-weight:700;}
.rp-status.paid{color:#059669;} .rp-status.unpaid{color:#dc2626;}
.rp-footer{margin-top:20px;font-size:11px;color:#aaa;text-align:center;}
hr.rp-div{border:none;border-top:2px solid #f0f0f0;margin:16px 0;}
.btn{padding:9px 18px;border-radius:8px;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;border:none;transition:all .18s;}
.btn-primary{background:var(--accent);color:#000;} .btn-primary:hover{background:#e8951a;}
.btn-ghost{background:var(--surface2);color:var(--text);border:1px solid var(--border);}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent);}
.btn-sm{padding:5px 11px;font-size:12px;}
.btn-danger{background:rgba(232,57,90,.12);color:var(--red);border:1px solid var(--red);}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:200;align-items:center;justify-content:center;}
.overlay.open{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:28px;width:460px;max-width:96vw;max-height:90vh;overflow-y:auto;}
.modal h3{font-size:18px;font-weight:800;margin-bottom:18px;}
.fg{margin-bottom:14px;}
.fg label{display:block;font-size:11px;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px;}
.fg input,.fg select,.fg textarea{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:9px 12px;border-radius:8px;font-family:inherit;font-size:14px;}
.fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:var(--accent);}
.fg textarea{resize:vertical;}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;}
#toast{position:fixed;bottom:20px;right:20px;background:var(--green);color:#000;padding:10px 18px;border-radius:8px;font-weight:700;font-size:13px;transform:translateY(60px);opacity:0;transition:all .28s;z-index:500;}
#toast.show{transform:translateY(0);opacity:1;}
::-webkit-scrollbar{width:5px;} ::-webkit-scrollbar-track{background:var(--bg);} ::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}

/* LOGIN */
#loginScreen{
  display:flex; position:fixed; inset:0; background:var(--bg);
  z-index:9999; align-items:center; justify-content:center;
}
#loginScreen.hidden{display:none;}
.login-box{
  background:var(--surface); border:1px solid var(--border);
  border-radius:20px; padding:40px 36px; width:360px; max-width:95vw; text-align:center;
}
.login-logo{font-family:'Bebas Neue',sans-serif;font-size:36px;color:var(--accent);letter-spacing:3px;margin-bottom:6px;}
.login-sub{font-size:13px;color:var(--muted);margin-bottom:32px;}
.login-box input{
  width:100%; background:var(--surface2); border:1px solid var(--border);
  color:var(--text); padding:12px 16px; border-radius:10px;
  font-family:inherit; font-size:15px; margin-bottom:14px; text-align:center;
}
.login-box input:focus{outline:none;border-color:var(--accent);}
.login-btn{
  width:100%; padding:12px; background:var(--accent); color:#000;
  border:none; border-radius:10px; font-family:inherit; font-size:15px;
  font-weight:700; cursor:pointer; transition:background .2s;
}
.login-btn:hover{background:#e8951a;}
.login-err{color:var(--red);font-size:13px;margin-top:10px;min-height:20px;}
</style>
</head>
<body>
<!-- LOGIN SCREEN -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">RENTAL</div>
    <div class="login-sub">房租管理系統 ・ 請輸入密碼</div>
    <input type="password" id="loginInput" placeholder="輸入密碼" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">登入</button>
    <div class="login-err" id="loginErr"></div>
  </div>
</div>

<header>
  <div class="logo">RENTAL <span>房租管理系統</span></div>
  <div style="display:flex;align-items:center;">
    <span id="syncStatus" class="syncing">⟳ 連線中...</span>
    <div class="month-nav" style="margin-left:16px;">
      <button onclick="changeMonth(-1)">&#8249;</button>
      <div id="monthLabel"></div>
      <button onclick="changeMonth(1)">&#8250;</button>
    </div>
  </div>
</header>
<nav>
  <button class="active" onclick="showPage('dashboard',this)">&#128202; 總覽</button>
  <button onclick="showPage('rooms',this)">&#127968; 房間管理</button>
  <button onclick="showPage('meter',this)">&#9889; 電錶抄表</button>
  <button onclick="showPage('gas',this)">&#128293; 瓦斯費</button>
  <button onclick="showPage('expenses',this)">&#128184; 支出管理</button>
  <button onclick="showPage('report',this)">&#128196; 租金報表</button>
</nav>
<main>
  <div id="dashboard" class="page active">
    <div class="stats">
      <div class="stat s-income"><div class="stat-label">本月收入</div><div class="stat-val green" id="s-income">NT$0</div><div class="stat-sub" id="s-income-sub"></div></div>
      <div class="stat s-expense"><div class="stat-label">本月支出</div><div class="stat-val red" id="s-expense">NT$0</div><div class="stat-sub" id="s-expense-sub"></div></div>
      <div class="stat s-profit"><div class="stat-label">本月淨利</div><div class="stat-val gold" id="s-profit">NT$0</div><div class="stat-sub">收入 − 支出</div></div>
      <div class="stat s-rooms"><div class="stat-label">繳費狀況</div><div class="stat-val purple" id="s-rooms">0/16</div><div class="stat-sub" id="s-rooms-sub"></div></div>
    </div>
    <div class="sec-hdr"><div class="sec-title">房間概覽</div><span style="font-size:12px;color:var(--muted)">點擊卡片快速標記繳費</span></div>
    <div class="rooms-grid" id="dash-grid"></div>
  </div>
  <div id="rooms" class="page">
    <div class="sec-hdr"><div class="sec-title">房間管理</div><button class="btn btn-primary" onclick="openRoomModal()">+ 新增房間</button></div>
    <div class="rooms-grid" id="rooms-grid"></div>
  </div>
  <div id="meter" class="page">
    <div class="sec-hdr"><div class="sec-title">&#9889; 電錶抄表</div><span style="font-size:12px;color:var(--muted)">電費 = (本月度數 − 上月度數) × NT$5</span></div>
    <div class="meter-grid" id="meter-grid"></div>
  </div>
  <div id="gas" class="page">
    <div class="sec-hdr">
      <div class="sec-title">&#128293; 瓦斯費管理</div>
      <button class="btn btn-primary" onclick="document.getElementById('gasOverlay').classList.add('open')">+ 新增瓦斯費</button>
    </div>
    <div id="gas-breakdown"></div>
  </div>
  <div id="expenses" class="page">
    <div class="sec-hdr"><div class="sec-title">支出管理</div><button class="btn btn-primary" onclick="openExpenseModal()">+ 新增支出</button></div>
    <div class="tbl-wrap"><table><thead><tr><th>項目</th><th>分類</th><th>金額</th><th>備註</th><th></th></tr></thead><tbody id="expense-tbody"></tbody></table></div>
  </div>
  <div id="report" class="page">
    <div class="sec-hdr"><div class="sec-title">租金報表</div></div>
    <div class="report-controls">
      <select id="report-select" onchange="renderReport()"><option value="">— 選擇房間 —</option></select>
      <button class="btn btn-primary" onclick="printReport()">&#128424; 列印 / PDF</button>
      <button class="btn btn-ghost" onclick="copyLine()">&#128203; 複製 LINE 文字</button>
    </div>
    <div id="report-area"></div>
  </div>
</main>

<!-- ROOM MODAL -->
<div class="overlay" id="roomOverlay">
  <div class="modal">
    <h3 id="roomModalTitle">新增房間</h3>
    <div class="frow">
      <div class="fg"><label>房號</label><input id="m-roomNo" type="text" placeholder="例：中間A"></div>
      <div class="fg"><label>月租金 (NT$)</label><input id="m-rent" type="number" placeholder="5000"></div>
    </div>
    <div class="fg"><label>租客姓名</label><input id="m-name" type="text" placeholder="阿麥"></div>
    <div class="fg"><label>越南文姓名</label><input id="m-nameVN" type="text" placeholder="A Mai"></div>
    <div class="frow">
      <div class="fg"><label>電話</label><input id="m-phone" type="text" placeholder="0912-345-678"></div>
      <div class="fg"><label>入住日期</label><input id="m-moveIn" type="date"></div>
    </div>
    <div class="frow">
      <div class="fg">
        <label>居住人數（水費每人$100）</label>
        <select id="m-persons">
          <option value="1">1 人 → NT$100</option>
          <option value="2">2 人 → NT$200</option>
          <option value="3">3 人 → NT$300</option>
          <option value="4">4 人 → NT$400</option>
        </select>
      </div>
      <div class="fg">
        <label>每月收租日</label>
        <select id="m-dueDay">
          <option value="1">每月 1 號</option><option value="2">每月 2 號</option><option value="3">每月 3 號</option>
          <option value="4">每月 4 號</option><option value="5">每月 5 號</option><option value="6">每月 6 號</option>
          <option value="7">每月 7 號</option><option value="8">每月 8 號</option><option value="9">每月 9 號</option>
          <option value="10">每月 10 號</option><option value="11">每月 11 號</option><option value="12">每月 12 號</option>
          <option value="13">每月 13 號</option><option value="14">每月 14 號</option><option value="15">每月 15 號</option>
          <option value="16">每月 16 號</option><option value="17">每月 17 號</option><option value="18">每月 18 號</option>
          <option value="19">每月 19 號</option><option value="20">每月 20 號</option><option value="21">每月 21 號</option>
          <option value="22">每月 22 號</option><option value="23">每月 23 號</option><option value="24">每月 24 號</option>
          <option value="25">每月 25 號</option><option value="26">每月 26 號</option><option value="27">每月 27 號</option>
          <option value="28">每月 28 號</option>
        </select>
      </div>
    </div>
    <div class="fg"><label>備註</label><textarea id="m-note" rows="2"></textarea></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeOverlay('roomOverlay')">取消</button>
      <button class="btn btn-danger btn-sm" id="m-delete" onclick="deleteRoom()" style="display:none">刪除</button>
      <button class="btn btn-primary" onclick="saveRoom()">儲存</button>
    </div>
  </div>
</div>

<!-- GAS MODAL -->
<div class="overlay" id="gasOverlay">
  <div class="modal">
    <h3>&#128293; 新增瓦斯費</h3>
    <div class="frow">
      <div class="fg">
        <label>區域</label>
        <select id="g-zone">
          <option value="後面">後面（11間）</option>
          <option value="中間">中間（5間）</option>
        </select>
      </div>
      <div class="fg">
        <label>每桶價格 (NT$)</label>
        <input id="g-price" type="number" placeholder="800">
      </div>
    </div>
    <div class="frow">
      <div class="fg">
        <label>桶數</label>
        <input id="g-qty" type="number" placeholder="3" min="1">
      </div>
      <div class="fg">
        <label>總金額（自動）</label>
        <input id="g-total" type="text" readonly style="background:var(--bg);color:var(--accent);font-weight:700;" placeholder="填寫後自動計算">
      </div>
    </div>
    <div class="fg">
      <label>購買日期（可填多個）</label>
      <input id="g-dates" type="text" placeholder="例：04/09、04/21">
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeOverlay('gasOverlay')">取消</button>
      <button class="btn btn-primary" onclick="addGasRecord()">新增</button>
    </div>
  </div>
</div>

<!-- EXPENSE MODAL -->
<div class="overlay" id="expOverlay">
  <div class="modal">
    <h3>新增支出</h3>
    <div class="fg"><label>項目名稱</label><input id="e-name" type="text" placeholder="例：水費"></div>
    <div class="frow">
      <div class="fg">
        <label>分類</label>
        <select id="e-cat">
          <option value="water">&#128166; 水費</option>
          <option value="electric">&#9889; 電費</option>
          <option value="repair">&#128295; 維修</option>
          <option value="other">&#128230; 其他</option>
        </select>
      </div>
      <div class="fg"><label>金額 (NT$)</label><input id="e-amount" type="number" placeholder="0"></div>
    </div>
    <div class="fg"><label>備註</label><input id="e-note" type="text" placeholder="選填"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeOverlay('expOverlay')">取消</button>
      <button class="btn btn-primary" onclick="saveExpense()">儲存</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<!-- Firebase SDK (compat) -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

  apiKey: "AIzaSyB1SyDsGq_aLAu4FBTEMikhsN-I-OXAWlM",
  authDomain: "rental-manager-c9ef5.firebaseapp.com",

// ── FIREBASE SYNC ──────────────────────────────────────────────────────────
function setSyncStatus(s){
  const el=document.getElementById('syncStatus');
  if(s==='ok'){el.textContent='● 已同步';el.className='ok';}
  else if(s==='syncing'){el.textContent='⟳ 同步中...';el.className='syncing';}
  else{el.textContent='✕ 離線';el.className='err';}
}

// Listen for real-time updates from Firebase
const dbRef = db.ref('rentalData');
dbRef.on("value", (snapshot)=>{
  const data = snapshot.val();
  if(data){
    S = data;
    if(!S.rooms) S.rooms=[];
    if(!S.payments) S.payments={};
    if(!S.expenses) S.expenses={};
    if(!S.meters) S.meters={};
    if(!S.gasRecords) S.gasRecords={};
  }
  // Sync master room definitions
  MASTER.forEach(m=>{
    const id='r_'+m.roomNo;
    let r=S.rooms.find(x=>x.id===id);
    if(r){r.roomNo=m.roomNo;r.name=m.name;r.rent=m.rent;r.persons=m.persons;r.dueDay=m.dueDay;}
    else S.rooms.push({id,roomNo:m.roomNo,name:m.name,nameVN:'',phone:'',moveIn:'',note:'',rent:m.rent,persons:m.persons,dueDay:m.dueDay,active:true});
  });
  // Pre-load prev month meters
  const prevKey=(()=>{const n=new Date();let pm=n.getMonth(),py=n.getFullYear();if(pm<1){pm=12;py--;}return py+'-'+String(pm).padStart(2,'0');})();
  if(!S.meters[prevKey]){
    S.meters[prevKey]={'r_後面B':493,'r_後面D':561,'r_後面3':451,'r_後面6':627,'r_中間A':1096,'r_後面4':840,'r_後面A':821,'r_中間E':296,'r_後面5':678,'r_中間C':974,'r_後面1':350,'r_後面2':533,'r_後面E':472,'r_中間D':1087,'r_中間B':938,'r_後面C':592};
  }
  // Pre-load gas records
  const thisKey=(()=>{const n=new Date();return n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0');})();
  if(!S.gasRecords[thisKey]){
    S.gasRecords[thisKey]=[
      {id:1,zone:'後面',price:800,qty:3,dates:'03/30、04/06、04/16'},
      {id:2,zone:'中間',price:800,qty:2,dates:'04/09、04/21'},
    ];
  }
  setSyncStatus('ok');
  renderAll();
}, (error)=>{
  setSyncStatus('err');
  console.error(error);
});

function save(){
  setSyncStatus('syncing');
  dbRef.set(S).then(()=>setSyncStatus('ok')).catch(()=>setSyncStatus('err'));
}

// ── MONTH ──────────────────────────────────────────────────────────────────
const now=new Date(); let CY=now.getFullYear(),CM=now.getMonth()+1;
function mk(){return CY+'-'+String(CM).padStart(2,'0');}
function prevMk(){let pm=CM-1,py=CY;if(pm<1){pm=12;py--;}return py+'-'+String(pm).padStart(2,'0');}
function updateMonthLabel(){document.getElementById('monthLabel').textContent=CY+' 年 '+MONTHS[CM-1];}
function changeMonth(d){CM+=d;if(CM>12){CM=1;CY++;}if(CM<1){CM=12;CY--;}updateMonthLabel();renderAll();}
updateMonthLabel();

// ── HELPERS ────────────────────────────────────────────────────────────────
function isPaid(id){return !!((S.payments[mk()]||{})[id]);}
function getWater(r){return (r.persons||1)*100;}
function getMeter(id){return (S.meters[mk()]||{})[id];}
function getPrevMeter(id){return (S.meters[prevMk()]||{})[id];}
function getElectric(id){
  const curr=getMeter(id),prev=getPrevMeter(id);
  if(curr!==undefined&&prev!==undefined) return Math.max(0,curr-prev)*5;
  return 0;
}
function getGas(r){
  const records=S.gasRecords[mk()]||[];
  let fee=0;
  records.forEach(rec=>{
    if(!r.roomNo.startsWith(rec.zone)) return;
    const zoneRooms=sorted().filter(x=>x.roomNo.startsWith(rec.zone)&&x.active!==false);
    const totalPersons=zoneRooms.reduce((s,x)=>s+(x.persons||1),0);
    fee+=Math.round(rec.price*rec.qty/totalPersons*(r.persons||1));
  });
  return fee;
}
function totalRoom(r){return r.rent+getWater(r)+getElectric(r.id)+getGas(r);}
function fmt(n){return 'NT$'+Number(n).toLocaleString();}
function sorted(){return [...S.rooms].sort((a,b)=>ROOM_ORDER.indexOf(a.roomNo)-ROOM_ORDER.indexOf(b.roomNo));}

function renderDash(){
  const active=sorted().filter(r=>r.active!==false);
  const paid=active.filter(r=>isPaid(r.id));
  const income=paid.reduce((s,r)=>s+totalRoom(r),0);
  const expList=S.expenses[mk()]||[];
  const expense=expList.reduce((s,e)=>s+e.amount,0);
  const profit=income-expense;
  document.getElementById('s-income').textContent=fmt(income);
  document.getElementById('s-income-sub').textContent=paid.length+' 間已繳費';
  document.getElementById('s-expense').textContent=fmt(expense);
  document.getElementById('s-expense-sub').textContent=expList.length+' 筆支出';
  const pel=document.getElementById('s-profit');
  pel.textContent=fmt(profit);pel.className='stat-val '+(profit>=0?'gold':'red');
  document.getElementById('s-rooms').textContent=paid.length+'/'+active.length;
  document.getElementById('s-rooms-sub').textContent=(active.length-paid.length)+' 間未繳';
  const g=document.getElementById('dash-grid');g.innerHTML='';
  sorted().forEach(r=>{
    const empty=r.active===false,p=isPaid(r.id);
    const cls=empty?'empty':p?'paid':'unpaid';
    const elec=getElectric(r.id);
    const d=document.createElement('div');
    d.className='room-card '+cls;
    d.onclick=()=>{if(!empty)togglePaid(r.id);};
    d.innerHTML='<div class="rn">'+r.roomNo+'</div>'+
      '<div class="rt">'+r.name+'</div>'+
      '<div class="rrent">'+fmt(totalRoom(r))+'</div>'+
      '<div class="rdue">&#128197; 每月 '+r.dueDay+' 號 &nbsp;|&nbsp; &#128101; '+r.persons+'人</div>'+
      '<div class="rdue">&#128166;'+fmt(getWater(r))+(elec?' &#9889;'+fmt(elec):'')+(getGas(r)?' &#128293;'+fmt(getGas(r)):'')+'</div>'+
      '<div class="rbadge '+cls+'">'+(empty?'空房':p?'&#10003; 已繳費':'&#9888; 未繳費')+'</div>';
    g.appendChild(d);
  });
}

window.previewMeter=function(id){
  const curr=parseFloat(document.getElementById('mc-'+id).value);
  const prev=getPrevMeter(id);
  const el=document.getElementById('mr-'+id);
  if(!isNaN(curr)&&prev!==undefined){const kwh=Math.max(0,curr-prev);el.textContent='⚡ '+kwh+' 度 × $5 = '+fmt(kwh*5);}
  else if(!isNaN(curr)){el.textContent='（上月無記錄）';}
  else{el.textContent='';}
};
window.saveMeter=function(id){
  const val=document.getElementById('mc-'+id).value;
  if(val==='') return showToast('請輸入度數');

  save();renderAll();showToast('✓ 已儲存');
};

// ── GAS ───────────────────────────────────────────────────────────────────
function renderGas(){
  const bd=document.getElementById('gas-breakdown');
  if(!bd) return;
  const records=S.gasRecords[mk()]||[];
  if(!records.length){bd.innerHTML='<div style="text-align:center;color:var(--muted);padding:32px">本月尚無瓦斯費記錄</div>';return;}
  let html='';
  records.forEach(rec=>{
    const zoneRooms=sorted().filter(r=>r.roomNo.startsWith(rec.zone)&&r.active!==false);
    const totalPersons=zoneRooms.reduce((s,r)=>s+(r.persons||1),0);
    const totalCost=rec.price*rec.qty;
    const perPerson=totalCost/totalPersons;
    html+='<div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:14px;">';
    html+='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">';
    html+='<div><div style="font-size:15px;font-weight:700;">&#128293; '+rec.zone+' 瓦斯費</div>';
    html+='<div style="font-size:12px;color:var(--muted);margin-top:3px;">NT$'+rec.price+'/桶 × '+rec.qty+'桶 = <strong style="color:var(--accent)">NT$'+totalCost.toLocaleString()+'</strong>';
    html+=' ÷ '+totalPersons+'人 = NT$'+perPerson.toFixed(1)+'/人';
    if(rec.dates) html+=' | '+rec.dates;
    html+='</div></div>';
    html+='<button class="btn btn-danger btn-sm" onclick="delGasRecord('+rec.id+')">刪除</button></div>';
    html+='<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;">';
    zoneRooms.forEach(r=>{
      const fee=Math.round(perPerson*(r.persons||1));
      html+='<div style="background:var(--surface2);border-radius:8px;padding:10px 12px;">'+
        '<div style="font-size:13px;font-weight:700;">'+r.roomNo+'</div>'+
        '<div style="font-size:11px;color:var(--muted);">'+r.name+' × '+r.persons+'人</div>'+
        '<div style="font-size:14px;font-weight:700;color:#fb923c;margin-top:4px;">NT$'+fee+'</div></div>';
    });
    const collected=zoneRooms.reduce((s,r)=>s+Math.round(perPerson*(r.persons||1)),0);
    html+='</div><div style="margin-top:10px;font-size:12px;color:var(--muted);">實際收取合計：<span style="color:var(--accent);font-weight:700;">NT$'+collected.toLocaleString()+'</span></div></div>';
  });
  bd.innerHTML=html;
}

function renderReport(){
  const id=document.getElementById('report-select').value;
  const area=document.getElementById('report-area');
  if(!id){area.innerHTML='<p style="color:var(--muted);text-align:center;padding:40px">請選擇房間以產生報表</p>';return;}
  const r=S.rooms.find(x=>x.id===id);if(!r) return;
  const water=getWater(r),elec=getElectric(id),total=r.rent+water+elec+getGas(r);
  const p=isPaid(id);
  const curr=getMeter(id),prev=getPrevMeter(id);
  const meterLine=curr!==undefined?'<div class="rp-row"><span class="lbl">&#9889; 電費 ('+(prev!==undefined?prev:'?')+'&#8594;'+curr+' 度)</span><span class="val">'+fmt(elec)+'</span></div>':'';
  const gasLines=(function(){
    const records=(S.gasRecords[mk()]||[]).filter(rec=>r.roomNo.startsWith(rec.zone));
    return records.map(rec=>{
      const zoneRooms=sorted().filter(x=>x.roomNo.startsWith(rec.zone)&&x.active!==false);
      const tp=zoneRooms.reduce((s,x)=>s+(x.persons||1),0);
      const fee=Math.round(rec.price*rec.qty/tp*(r.persons||1));
      return '<div class="rp-row"><span class="lbl">&#128293; 瓦斯費 '+rec.zone+' ×'+rec.qty+'桶'+(rec.dates?' ('+rec.dates+')':'')+
        '</span><span class="val">'+fmt(fee)+'</span></div>';
    }).join('');
  })();
  area.innerHTML='<div class="rp-wrap" id="printable">'+
    '<div class="rp-logo">RENTAL MANAGEMENT SYSTEM</div>'+
    '<h2>租金繳費通知</h2>'+
    '<div class="rp-sub">Thông báo tiền thuê nhà &nbsp;|&nbsp; '+CY+'年 '+MONTHS[CM-1]+'</div>'+
    '<div class="rp-info">'+
      '<div class="rp-info-row"><span class="k">房號</span><span class="v">'+r.roomNo+'</span></div>'+
      '<div class="rp-info-row"><span class="k">租客</span><span class="v">'+r.name+(r.nameVN?' / '+r.nameVN:'')+'</span></div>'+
      (r.phone?'<div class="rp-info-row"><span class="k">電話</span><span class="v">'+r.phone+'</span></div>':'')+
      '<div class="rp-info-row"><span class="k">收租日</span><span class="v">每月 '+r.dueDay+' 號</span></div>'+
      '<div class="rp-info-row"><span class="k">居住人數</span><span class="v">'+r.persons+' 人</span></div>'+
    '</div>'+
    '<div class="rp-row"><span class="lbl">&#127968; 房租 (Tiền thuê)</span><span class="val">'+fmt(r.rent)+'</span></div>'+
    '<div class="rp-row"><span class="lbl">&#128166; 水費 (Tiền nước) × '+r.persons+'人</span><span class="val">'+fmt(water)+'</span></div>'+
    gasLines+meterLine+
    (r.note?'<div class="rp-row"><span class="lbl">備註</span><span class="val" style="font-size:12px;color:#888">'+r.note+'</span></div>':'')+
    '<div class="rp-total"><span>應繳總金額</span><span>'+fmt(total)+'</span></div>'+
    '<div class="rp-status '+(p?'paid':'unpaid')+'">'+(p?'✅ 已繳清':'⚠️ 尚未繳費')+'</div>'+
    '<hr class="rp-div">'+
    '<div class="rp-footer">感謝您的配合 ・ Cảm ơn bạn đã hợp tác<br>'+CY+'年 '+MONTHS[CM-1]+'</div>'+
    '</div>';
}
window.renderReport=renderReport;
window.printReport=function(){
  const el=document.getElementById('printable');
  if(!el) return alert('請先選擇房間');
  const w=window.open('','_blank');
  w.document.write('<html><head><style>body{font-family:sans-serif;margin:36px;color:#1a1a2e}h2{font-size:20px;font-weight:900;margin-bottom:3px}.rp-sub{font-size:12px;color:#777;margin-bottom:18px}.rp-logo{font-size:10px;color:#bbb;text-align:right;margin-bottom:14px;letter-spacing:1px}.rp-info{background:#f9fafb;border-radius:8px;padding:12px;margin-bottom:16px}.rp-info-row{display:flex;gap:10px;margin-bottom:4px;font-size:13px}.rp-info-row .k{color:#888;min-width:60px}.rp-info-row .v{font-weight:600}.rp-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #f0f0f0;font-size:13px}.rp-row .lbl{color:#555}.rp-row .val{font-weight:700}.rp-total{background:#1a1a2e;color:white;padding:13px 16px;border-radius:8px;display:flex;justify-content:space-between;font-weight:900;font-size:16px;margin-top:16px}.rp-status{text-align:center;margin-top:12px;font-size:14px;font-weight:700}.rp-status.paid{color:#059669}.rp-status.unpaid{color:#dc2626}.rp-footer{margin-top:18px;font-size:11px;color:#aaa;text-align:center}hr{border:none;border-top:2px solid #f0f0f0;margin:14px 0}</style></head><body>'+el.innerHTML+'</body></html>');
  w.document.close();setTimeout(()=>w.print(),400);
};
window.copyLine=function(){
  const id=document.getElementById('report-select').value;
  if(!id) return alert('請先選擇房間');
  const r=S.rooms.find(x=>x.id===id);
  const water=getWater(r),elec=getElectric(id),gas=getGas(r),total=r.rent+water+elec+gas;
  const p=isPaid(id);
  const curr=getMeter(id),prev=getPrevMeter(id);
  let t='📋 租金繳費通知 '+CY+'/'+CM+'\n━━━━━━━━━━━━━━━━\n';
  t+='🏠 房號：'+r.roomNo+'\n👤 '+r.name+(r.nameVN?' / '+r.nameVN:'')+'\n';
  t+='📅 收租日：每月 '+r.dueDay+' 號\n━━━━━━━━━━━━━━━━\n';
  t+='🏷 房租：'+fmt(r.rent)+'\n💧 水費：'+fmt(water)+'（'+r.persons+'人）\n';
  if(gas) t+='🔥 瓦斯費：'+fmt(gas)+'（'+r.persons+'人）\n';
  if(curr!==undefined) t+='⚡ 電費：'+fmt(elec)+'（'+(prev!==undefined?prev:'?')+'→'+curr+'度）\n';
  t+='━━━━━━━━━━━━━━━━\n💰 應繳總額：'+fmt(total)+'\n';
  t+='狀態：'+(p?'✅ 已繳清':'⚠️ 尚未繳費')+'\n━━━━━━━━━━━━━━━━\n感謝配合 🙏 Cảm ơn!';
  navigator.clipboard.writeText(t).then(()=>showToast('✓ 已複製！可貼到 LINE'));
};

// ── UTILS ─────────────────────────────────────────────────────────────────
window.closeOverlay=function(id){document.getElementById(id).classList.remove('open');};
document.addEventListener('input',function(e){
  if(e.target.id==='g-price'||e.target.id==='g-qty'){
    const p=parseInt(document.getElementById('g-price').value)||0;
    const q=parseInt(document.getElementById('g-qty').value)||0;
    document.getElementById('g-total').value=p&&q?'NT$'+(p*q).toLocaleString():'';
  }
});
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}
window.showToast=showToast;
document.querySelectorAll('.overlay').forEach(o=>o.addEventListener('click',e=>{if(e.target===o)o.classList.remove('open');}));

</script>
</body>
</html>
